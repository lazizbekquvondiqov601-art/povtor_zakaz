{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Zakaz Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 20px;
            padding: 48px 36px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        /* Error state */
        .icon-wrap {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            background: rgba(239, 68, 68, 0.12);
            border: 2px solid rgba(239, 68, 68, 0.3);
        }
        .icon-wrap svg { width: 36px; height: 36px; color: #ef4444; }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
        }

        /* Loading state */
        .loading-wrap {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            background: rgba(99, 179, 237, 0.08);
            border: 2px solid rgba(99, 179, 237, 0.2);
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(99, 179, 237, 0.2);
            border-top-color: #63b3ed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .state { display: none; }
        .state.active { display: block; }
    </style>
</head>
<body>

<div class="card">
    <!-- Loading state (default while JS checks) -->
    <div class="state active" id="stateLoading">
        <div class="loading-wrap">
            <div class="spinner"></div>
        </div>
        <div class="title">Yuklanmoqda...</div>
        <div class="subtitle">Iltimos, kuting.</div>
    </div>

    <!-- Error state (not from Telegram) -->
    <div class="state" id="stateError">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>
        <div class="title">Xatolik</div>
        <div class="subtitle">Iltimos, Telegram botidan oching.</div>
    </div>
</div>

<script>
(function () {
    var tg = window.Telegram && window.Telegram.WebApp;

    function showError() {
        document.getElementById('stateLoading').classList.remove('active');
        document.getElementById('stateError').classList.add('active');
    }

    function proceed() {
        // Telegram WebApp dan kirilgan — to'liq ekran, keyin dashboardga yo'nalt
        if (tg) {
            tg.expand();
            if (typeof tg.requestFullscreen === 'function' && !tg.isFullscreen) {
                tg.requestFullscreen();
            }
            tg.ready();
        }
        window.location.href = '/';
    }

    if (!tg || !tg.initData || tg.initData.trim() === '') {
        // Browser orqali kirgan
        showError();
        return;
    }

    // Haqiqiy Telegram WebApp — davom etish
    proceed();
})();
</script>

</body>
</html>
